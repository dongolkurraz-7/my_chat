<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Chat</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #212121;
  color: #fff;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
.sidebar {
  width: 260px;
  background: #171717;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 5px;
}
.new-chat {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}
.new-chat:hover { background: #2a2a2a; }
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: #ccc;
}
.sidebar-item:hover { background: #2a2a2a; color: #fff; }
.sidebar-bottom {
  margin-top: auto;
  border-top: 1px solid #333;
  padding-top: 10px;
}
.user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
.user:hover { background: #2a2a2a; }
.avatar {
  width: 32px; height: 32px;
  background: #19c37d;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding-bottom: 80px;
}
.welcome h1 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 30px;
  text-align: center;
}
.suggestions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 600px;
  width: 90%;
  margin-bottom: 30px;
}
.suggestion {
  background: #2a2a2a;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  font-size: 13px;
  color: #ccc;
}
.suggestion:hover { background: #333; color: #fff; }
.suggestion strong {
  display: block;
  color: #fff;
  margin-bottom: 4px;
}
.input-wrap {
  position: fixed;
  bottom: 20px;
  width: 55%;
  background: #2f2f2f;
  border-radius: 16px;
  padding: 10px 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid #444;
}
.input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 15px;
}
.input-wrap input::placeholder { color: #666; }
.btn {
  background: none;
  border: none;
  color: #aaa;
  cursor: pointer;
  font-size: 18px;
  padding: 5px;
  border-radius: 6px;
}
.btn:hover { color: #fff; background: #444; }
.send {
  background: #fff;
  color: #000;
  border: none;
  border-radius: 8px;
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 16px;
}
.send:hover { background: #ddd; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="new-chat">
    <span>✏️ New chat</span>
    <span>🔍</span>
  </div>
  <div class="sidebar-item">💬 ChatGPT</div>
  <div class="sidebar-item">🖼️ Sora</div>
  <div class="sidebar-item">🔍 Search chats</div>
  <div class="sidebar-item">⭐ Starred</div>
  <div class="sidebar-bottom">
    <div class="user">
      <div class="avatar">Y</div>
      <span style="font-size:14px;">YourName</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="welcome">
    <h1>What can I help with?</h1>
  </div>
  <div class="suggestions">
    <div class="suggestion">
      <strong>📝 Write</strong>Help me write an email
    </div>
    <div class="suggestion">
      <strong>💡 Brainstorm</strong>Give me ideas
    </div>
    <div class="suggestion">
      <strong>💻 Code</strong>Help me debug
    </div>
    <div class="suggestion">
      <strong>📊 Analyze</strong>Summarize a document
    </div>
  </div>
  <div class="input-wrap">
    <button class="btn">➕</button>
    <input type="text" placeholder="Ask anything...">
    <button class="btn">🌐</button>
    <button class="btn">🎤</button>
    <button class="send">↑</button>
  </div>
</div>

</body>
</html>
